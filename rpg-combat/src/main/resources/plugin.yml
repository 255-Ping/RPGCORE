name: rpg-combat
version: '${version}'
main: com.github._255_ping.rpg.combat.RpgCombatPlugin
api-version: '26.1.2'
load: POSTWORLD
authors: [Ping]
description: Combat skill — XP from damage dealt via the core damage pipeline.
depend: [rpg-core]
commands:
  combat:
    description: Combat admin commands
    usage: /combat reload
permissions:
  rpg.combat.admin.reload:
    description: Reload rpg-combat config
    default: op
