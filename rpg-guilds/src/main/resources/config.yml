# rpg-guilds — persistent guilds.

# v1: simple owner / officer / member ranks. Custom rank renaming arrives later.

max-members: 50

# Currency cost to create a guild (charged via rpg-economy if loaded; otherwise free).
creation:
  cost: 10000

# Seconds before a pending invite expires.
invite-timeout-seconds: 60

# Guild XP — a fraction of each member's earned skill XP flows into the guild's total XP pool.
xp-sharing:
  enabled: true
  rate-percent: 10    # percent (0-100) of each member's skill XP that flows to the guild

# XP cost to advance the guild from 'level' to 'level+1'. Uses the expression evaluator.
# Variable available: level (current level, 1-based).
guild-curve: "level * level * 1000"

# Maximum attainable guild level.
guild-max-level: 25

# Stat bonuses granted to every guild member, scaling with guild level.
# Each key is a stat ID; the value is an expression with 'level' as a variable.
# Remove or comment out any entry to disable that perk.
guild-perks:
  max_health: "level * 5"
  strength: "level * 2"
  defense: "level"
