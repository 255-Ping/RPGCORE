# Example custom crafting recipes.
# Each top-level key is the recipe ID (lowercase).
# Shape:       3-row grid using character keys; spaces = empty slot.
# Ingredients: maps each character to { item: <id>, amount: N }
# Output:      { item: <id>, amount: N }
# Shapeless:   true → Ingredients is a list of { item: <id>, amount: N }
#
# Items can be custom RPG item IDs or vanilla Material names (e.g. DIAMOND_SWORD).

# ── Shaped: vanilla ingredients → custom RPG item ─────────────────────────────
# 2 iron ingots in a column + a stick = Iron Shortsword.
shaped_iron_shortsword:
  Shape:
  - " I "
  - " I "
  - " S "
  Ingredients:
    I: { item: IRON_INGOT, amount: 1 }
    S: { item: STICK, amount: 1 }
  Output: { item: iron_shortsword, amount: 1 }

# ── Shaped: custom RPG ingredients → custom RPG item ──────────────────────────
# 9 iron nuggets compressed into a Crude Iron Ingot (our custom material).
shaped_crude_iron_ingot:
  Shape:
  - "NNN"
  - "NNN"
  - "NNN"
  Ingredients:
    N: { item: IRON_NUGGET, amount: 1 }
  Output: { item: crude_iron_ingot, amount: 1 }

# ── Shapeless: mix two items in any arrangement ────────────────────────────────
# A red gem dissolved into a glass bottle becomes an Antidote Flask.
shapeless_antidote_flask:
  Shapeless: true
  Ingredients:
  - { item: red_gem, amount: 1 }
  - { item: GLASS_BOTTLE, amount: 1 }
  Output: { item: antidote_flask, amount: 1 }

# ── Shaped: multi-amount output ────────────────────────────────────────────────
# Redstone in a diamond pattern yields 3 Red Gems at once.
# Use multi-amount recipes for bulk crafting and resource conversion.
shaped_red_gems:
  Shape:
  - " R "
  - "R R"
  - " R "
  Ingredients:
    R: { item: REDSTONE, amount: 1 }
  Output: { item: red_gem, amount: 3 }
