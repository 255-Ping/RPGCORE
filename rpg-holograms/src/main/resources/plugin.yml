name: rpg-holograms
version: '${version}'
main: com.github._255_ping.rpg.holograms.RpgHologramsPlugin
api-version: '26.1.2'
load: POSTWORLD
authors: [Ping]
description: Damage indicators (DisplayEntity-based). Holograms editor coming later.
depend: [rpg-core]
commands:
  holograms:
    description: Holograms admin commands
    aliases: [holo]
    usage: /holograms reload
permissions:
  rpg.holograms.admin.reload:
    description: Reload rpg-holograms config
    default: op
