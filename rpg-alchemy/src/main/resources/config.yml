# rpg-alchemy config.

features:
  brewing: true       # brewing station block + recipe-driven brewing
  drinking: true      # right-click custom potions to consume

# Brewing duration in ticks per recipe; can be overridden per recipe.
default-brew-ticks: 200

# Skill XP awards.
xp:
  per-brew: 30
  per-drink: 0
