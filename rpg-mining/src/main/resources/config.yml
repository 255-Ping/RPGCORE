# rpg-mining config.
# XP awarded = (per-block-id from xp-per-block, falling back to default-xp) * (1 + MINING_WISDOM / 100).
# Example: default-xp 5, MINING_WISDOM 50 → 5 * 1.5 = 7.5 XP (rounded down).
# Custom blocks must have their block id listed under xp-per-block to award non-default XP.
# Custom block ids come from plugins/rpg-core/blocks/*.yml.

default-xp: 5   # XP for any custom block not explicitly listed in xp-per-block

# Mining fatigue applied while holding a gathering tool (item with mining_speed, breaking_power,
# or foraging_speed stat). This completely prevents vanilla block mining — players must use the
# RPG block-break system (hold left-click with a tool that has sufficient breaking_power).
# Amplifier 255 = instant-infinite break time; vanilla blocks cannot be mined at all.
# Lower values (e.g. 2) only slow mining rather than prevent it.
mining-fatigue:
  enabled: true
  # Amplifier 8 → break speed ≈ 0.02% of normal. This value is tiny but nonzero in
  # float32, so the client enters its "active mining" visual state (arm raises, swings).
  # Amplifier 255 rounded to exactly 0.0f, suppressing the animation entirely.
  # Vanilla can never complete a break in practice at this speed (~5+ hours per block);
  # BlockBreakEvent cancellation in rpg-core is the hard stop if it somehow did.
  amplifier: 8

# Per-block-id XP overrides. Match the block id from plugins/rpg-core/blocks/*.yml.
# Blocks not listed here fall back to default-xp.
xp-per-block:
  red_gem_block: 20   # example custom ore block; higher XP for rare nodes
  iron_node: 15       # example iron ore node
