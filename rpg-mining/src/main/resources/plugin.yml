name: rpg-mining
version: '${version}'
main: com.github._255_ping.rpg.mining.RpgMiningPlugin
api-version: '26.1.2'
load: POSTWORLD
authors: [Ping]
description: Mining skill — XP from breaking custom RPG blocks (ores).
depend: [rpg-core]
commands:
  mining:
    description: Mining admin commands
    usage: /mining reload
permissions:
  rpg.mining.admin.reload:
    description: Reload rpg-mining config
    default: op
