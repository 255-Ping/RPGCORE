# rpg-farming — XP from harvesting mature crops. Scaled by FARMING_WISDOM.
# Drop multiplier from FARMING_FORTUNE: every 100 pts = +1 guaranteed extra multiply;
# fractional part is probabilistic (50 fortune → 50 % chance of ×2 vs ×1).
# Fortune only triggers for blocks listed in xp-per-block at maximum crop age.

default-xp: 3

# Per-material XP. Only awarded when the crop is at maximum age.
xp-per-block:
  wheat: 3
  carrots: 3
  potatoes: 3
  beetroots: 4
  nether_wart: 5
  cocoa: 4
  pumpkin: 6
  melon: 6
  sugar_cane: 2
  bamboo: 1
