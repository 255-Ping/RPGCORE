# Generated by: ${pluginName} v${version}
# rpg-bossbar configuration

bossbar:
  # Default radius (blocks) within which a player must be to see a mob's boss bar.
  # Can be overridden per-mob with BossBar.Range: <n> in the mob YAML.
  default-show-range: 64.0

  # How often (ticks) the proximity task runs to show/hide boss bars.
  # Lower = more responsive; higher = less overhead. Default 40 = every 2 seconds.
  proximity-interval-ticks: 40
