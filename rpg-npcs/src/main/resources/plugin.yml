name: rpg-npcs
version: '${version}'
main: com.github._255_ping.rpg.npcs.RpgNpcsPlugin
api-version: '26.1.2'
load: POSTWORLD
authors: [Ping]
description: Display-entity-based NPCs with shop, dialogue, and quest hand-off behaviour.
depend: [rpg-core]
softdepend: [rpg-economy, rpg-quests]
commands:
  npc:
    description: NPC admin commands
    usage: /npc — type /npc for full help
permissions:
  rpg.npcs.admin.create:
    description: Create an NPC
    default: op
  rpg.npcs.admin.delete:
    description: Delete an NPC
    default: op
  rpg.npcs.admin.move:
    description: Move an NPC
    default: op
  rpg.npcs.admin.list:
    description: List / info NPCs
    default: op
  rpg.npcs.admin.reload:
    description: Reload NPC YAMLs
    default: op
  rpg.npcs.admin.setbehavior:
    description: Set an NPC's behavior
    default: op
  rpg.npcs.admin.setentitytype:
    description: Set an NPC's entity type
    default: op
  rpg.npcs.admin.setstyle:
    description: Switch an NPC's body style (entity/player)
    default: op
  rpg.npcs.admin.setskin:
    description: Apply a player skin to an NPC
    default: op
  rpg.npcs.admin.dialogue:
    description: Edit an NPC's dialogue in-game
    default: op
  rpg.npcs.admin.shop:
    description: Edit an NPC's shop items in-game
    default: op
  rpg.npcs.admin.setlook:
    description: Toggle look-at-player on an NPC
    default: op
  rpg.npcs.use:
    description: Click NPCs to interact
    default: true
