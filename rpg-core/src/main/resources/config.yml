# rpg-core main configuration.
# Full documentation: docs/configuration.md and docs/core/vanilla-suppression.md

persistence:
  # backend: yaml (default) | mysql
  # If 'mysql' fails to connect, rpg-core falls back to YAML with a warning.
  backend: yaml
  mysql:
    host: 127.0.0.1
    port: 3306
    database: rpg
    user: rpg
    password: ""
    pool-size: 8
    use-ssl: false

# Total-vanilla-replacement master toggles.
# Defaults reflect project intent: every vanilla mechanic off, our own custom one on.
# Listener wiring lands per-flag as each replacement system ships — flags without
# wiring yet are harmless to set true.
vanilla-suppression:
  mob-spawning: true          # cancel natural mob spawns; admin spawners are the only source
  mob-loot: true              # cancel vanilla drops; loot comes from mob YAML loot tables
  mob-ai: true                # disable vanilla AI on tagged mobs
  damage: true                # cancel vanilla damage, route through our pipeline
  player-regen: true          # cancel vanilla HP regen; HEALTH_REGEN drives ours
  hunger: true                # cancel vanilla hunger drain
  xp-orbs: true               # cancel vanilla XP orb pickup
  enchanting-table: true      # cancel vanilla enchant table
  anvil: true                 # cancel vanilla anvil
  brewing-stand: true         # cancel vanilla brewing
  potions: true               # cancel vanilla potion effects on entities
  smelting: true              # cancel vanilla furnace recipes
  crafting: true              # cancel vanilla crafting recipes
  fishing: true               # cancel vanilla fishing loot
  villager-trading: true      # cancel vanilla villager trades
  raids: true                 # disable pillager raids
  pillager-patrols: true      # disable patrol spawning
  beacons: true               # cancel beacon effects
  death-drops: true           # cancel vanilla death drops
  block-explosion-damage: true # cancel explosion damage to entities (region flag can override)
  block-break-tagged: true    # cancel vanilla break for tagged custom blocks
  durability: false           # cancel item durability loss (items never wear out); false by default

# Creative players bypass our custom systems (so admins can build freely).
creative-mode-bypass:
  break-time: true
  damage: true
  economy: true
  region-flags: true

# Repurposed vanilla bars.
vanilla-xp-bar: most-recent   # most-recent | pinned | hidden
hunger-bar: hidden            # hidden | frozen-visible
armor-bar: hidden             # hidden | visible

# Health display (see docs/core/health-display.md).
health:
  default-max: 100
  bukkit-max-health: 40.0
  resync-interval-ticks: 1

# Starting state for a freshly-joined player.
# Stats here seed each player's base stats; armor / accessories / status
# effects / skill milestones layer on top once those systems ship.
starting-state:
  hp: 100
  mana: 100
  base-stats:
    max_health: 100
    max_mana: 100
    health_regen: 2
    mana_regen: 5
    damage: 1
    defense: 0
    speed: 0
    crit_chance: 10
    crit_damage: 50
    mining_speed: 10
    foraging_speed: 10
    breaking_power: 1

# Regen tick rate (HP and mana regen both run on this schedule).
regen:
  interval-ticks: 20             # 20 ticks = 1 second

# Skill framework (per-skill addons layer their own configs on top).
# Each skill uses the default curve unless overridden under its own key here.
# Variables available in curves: level, prev_xp_total.
# Functions: pow sqrt min max floor ceil round abs log ln.
#
# Per-skill overrides example:
#
#   combat:
#     max-level: 50
#     curve: "100 * level ^ 1.5"
#     per-level-gains:     # added every level — base stats grow with the skill
#       max_health: 2
#       strength: 1
#     milestones:          # one-off bonuses at specific levels
#       5:  { crit_chance: 1 }
#       10: { ferocity: 5, max_health: 10 }
#       25: { ferocity: 10 }
skills:
  default-max-level: 50
  default-curve: "100 * level ^ 1.5"

# Status-effect tick scheduler. One task scans active effects every tick.
status-effects:
  scheduler-interval-ticks: 1

# Natural mob spawning rules under plugins/rpg-core/natural-spawning/*.yml.
# Disabled by default — admin spawners are the canonical source until the world
# is built out enough that natural waves make sense.
natural-spawning:
  enabled: false
  interval-ticks: 20

# Mob AI overrides — how often the AI tick task runs (10 ticks = twice/sec).
mob-ai:
  interval-ticks: 10

# Combat tagging (see docs/core/damage.md).
combat-tag:
  duration-seconds: 8
  vitality-reduction-percent-per-point: 1
  vitality-reduction-cap-percent: 50

# Death rules — ordered list, first permission held wins.
# drop-coins-amount: a number, "all", or "<n>percent" (e.g. "50percent").
# drop-items-percent: percentage of inventory to drop on death (rolled per slot).
# keep-xp: keep skill XP since last level (true) or zero it (false).
death-rules:
  enabled: true
  coin-pile-pickup-radius: 1.5
  coin-pile-lifetime-seconds: 300
  tiers:
    - permission: rpg.death.vip
      drop-items-percent: 0
      drop-coins-amount: 0
      keep-xp: true
    - permission: rpg.death.default
      drop-items-percent: 100
      drop-coins-amount: "50percent"
      keep-xp: false

# Chat name format defaults (used by NameFormatter — LuckPerms is a soft-dep).
chat-name-format:
  use-luckperms-prefix: true
  use-luckperms-suffix: true
  fallback-format: "{name}"

# Locale for messages.yml selection (en is shipped; others come later).
locale: en

# Floating damage indicators (TextDisplay entities above the hit mob).
damage-indicators:
  enabled: true
  duration-ticks: 30       # total life of the indicator
  rise-blocks: 1.5         # how far the number floats upward before fading

# Mob health bar shown in the mob's display name after each hit.
mob-health-bar:
  enabled: true
  bar-length: 10           # number of segments in the █░ bar

# Level scaling — reduces damage when players are much higher level than a mob.
# Applies to both player→mob and mob→player directions.
# per-level-gains control how a mob's stats grow with each level above 1.
#   health:         flat HP added per level  (e.g. level 5 mob gets +4 * 5 = 20 extra HP)
#   damage-percent: outgoing damage multiplied by 1 + (level-1) * X / 100 per level
#   defense:        effective defense points added per level (reduces incoming damage)
level-scaling:
  enabled: true
  threshold: 5             # level difference before scaling kicks in
  reduction-per-level: 0.08  # damage multiplier reduction per level above threshold
  min-damage-factor: 0.10  # floor: never reduce below 10% of base damage
  per-level-gains:
    health: 5.0            # flat HP per level above 1
    damage-percent: 5.0    # % outgoing damage increase per level above 1
    defense: 2.0           # defense points per level above 1

# GUI styling — see docs/formatting.md for the full layout convention.
# All inventory GUIs in the suite read their pane materials/names from here.
# Changing these values reskins every GUI at once.
gui:
  background-material: GRAY_STAINED_GLASS_PANE  # fills empty/background slots
  border-material: BLACK_STAINED_GLASS_PANE      # bottom border row (extra space)
  background-name: " "                           # supports & color codes
  border-name: " "

# Debug logging per-system. Verbose builds are noisy — leave off in prod.
debug:
  damage: false
  spawning: false
  skills: false
  status-effects: false
  persistence: false
