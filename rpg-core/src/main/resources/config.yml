# Generated by: ${pluginName} v${version}
# rpg-core main configuration.
# Full documentation: docs/configuration.md and docs/core/vanilla-suppression.md

persistence:
  # Storage backend: yaml (flat-file, default) | mysql (recommended for multi-server)
  # If 'mysql' fails to connect, rpg-core falls back to YAML with a warning.
  #
  # NOTE: rpg-core writes a separate file — plugins/rpg-core/backend.yml — on each startup.
  # That file is internal migration bookkeeping used to detect backend switches between runs.
  # Do NOT edit backend.yml manually. The only file you need to touch is this one (config.yml).
  # See docs/core/persistence.md for the full explanation.
  backend: yaml
  mysql:
    host: 127.0.0.1
    port: 3306
    database: rpg
    user: rpg
    password: ""
    pool-size: 8         # HikariCP connection pool size; 8 is fine for a single-server setup
    use-ssl: false

# Total-vanilla-replacement master toggles.
# Defaults reflect project intent: every vanilla mechanic off, our own custom one on.
# Listener wiring lands per-flag as each replacement system ships — flags without
# wiring yet are harmless to set true.
vanilla-suppression:
  mob-spawning: true          # cancel natural mob spawns; admin spawners are the only source
  mob-loot: true              # cancel vanilla drops; loot comes from mob YAML loot tables
  mob-ai: true                # disable vanilla AI on tagged mobs
  damage: true                # cancel vanilla damage, route through our pipeline
  player-regen: true          # cancel vanilla HP regen; HEALTH_REGEN drives ours
  hunger: true                # cancel vanilla hunger drain
  xp-orbs: true               # cancel vanilla XP orb pickup
  enchanting-table: true      # cancel vanilla enchant table
  anvil: true                 # cancel vanilla anvil
  brewing-stand: true         # cancel vanilla brewing
  potions: true               # cancel vanilla potion effects on entities (true = suppress; false = allow vanilla potions)
  smelting: true              # cancel vanilla furnace recipes
  crafting: true              # cancel vanilla crafting recipes
  fishing: true               # cancel vanilla fishing loot
  villager-trading: true      # cancel vanilla villager trades
  raids: true                 # disable pillager raids
  pillager-patrols: true      # disable patrol spawning
  beacons: true               # cancel beacon effects
  death-drops: true           # cancel vanilla death drops
  block-explosion-damage: true # cancel explosion damage to entities (region flag can override)
  block-break-tagged: true    # cancel vanilla break for tagged custom blocks
  durability: false           # cancel item durability loss (items never wear out); false by default

# Creative players bypass our custom systems (so admins can build freely).
# Requires the rpg.admin permission in addition to creative mode.
creative-mode-bypass:
  break-time: true     # instant-break custom blocks in creative (still requires rpg.admin)
  damage: true         # creative players deal/take no RPG damage
  economy: true        # creative players can purchase anything for free
  region-flags: true   # creative players ignore entry/exit/no-break/pvp region flags

# Repurposed vanilla bars.
# Options:
#   vanilla-xp-bar: most-recent (shows most-recently-gained skill XP) | pinned (always one skill) | hidden
#   hunger-bar:     hidden | frozen-visible (bar stays full, still visible)
#   armor-bar:      hidden | visible
vanilla-xp-bar: most-recent
hunger-bar: hidden
armor-bar: hidden

# Health display (see docs/core/health-display.md).
health:
  default-max: 100           # default maximum HP for new players (can be raised by stats/milestones)
  bukkit-max-health: 40.0    # internal Bukkit max-health attribute; never set below 2.0. RPG HP is mapped
                              # into this range for hearts display. 40.0 = 20 hearts shown when at max RPG HP.
  resync-interval-ticks: 1   # how often Bukkit HP is resynced to RPG HP (1 = every tick, safest)

# Starting state for a freshly-joined player.
# Stats here seed each player's base stats; armor / accessories / status
# effects / skill milestones layer on top once those systems ship.
starting-state:
  hp: 100       # starting current HP (must be ≤ base-stats.max_health)
  mana: 100     # starting current mana (must be ≤ base-stats.max_mana)
  base-stats:
    max_health: 100      # total HP pool
    max_mana: 100        # total mana pool
    health_regen: 2      # HP restored per regen tick (see regen.interval-ticks)
    mana_regen: 5        # mana restored per regen tick
    damage: 1            # base outgoing damage multiplier (weapon stats add on top)
    defense: 0           # reduces incoming damage (each point ~ 0.5% reduction, formula in DamageMath)
    speed: 0             # movement speed bonus (each point = +1% walk speed above vanilla default)
    crit_chance: 10      # % chance to land a critical hit (0–100; can exceed 100 with diminishing returns)
    crit_damage: 50      # % bonus damage on a crit (50 = 1.5× base damage)
    mining_speed: 10     # custom block break speed (higher = faster; 100 = instant)
    foraging_speed: 10   # log-break speed equivalent
    breaking_power: 1    # minimum tier required to break custom blocks (1 = tier-1+, 2 = tier-2+ etc.)

# Regen tick rate (HP and mana regen both run on this schedule).
regen:
  interval-ticks: 20    # 20 ticks = 1 second; lower values = smoother but more CPU

# Skill framework (per-skill addons layer their own configs on top).
# Each skill uses the default curve unless overridden under its own key here.
# Variables available in curves: level, prev_xp_total.
# Functions: pow sqrt min max floor ceil round abs log ln.
#
# Per-skill overrides example:
#
#   combat:
#     max-level: 50
#     curve: "100 * level ^ 1.5"
#     per-level-gains:     # added every level — base stats grow with the skill
#       max_health: 2
#       strength: 1
#     milestones:          # one-off bonuses at specific levels
#       5:  { crit_chance: 1 }
#       10: { ferocity: 5, max_health: 10 }
#       25: { ferocity: 10 }
skills:
  default-max-level: 50        # cap applied to all skills that don't define their own max-level
  default-curve: "100 * level ^ 1.5"  # XP required to reach 'level'; e.g. level 10 needs 3162 XP

# Status-effect tick scheduler. One task scans active effects every tick.
status-effects:
  scheduler-interval-ticks: 1  # 1 = every tick. Raise to 2–4 if you have many concurrent players

# Loot system settings.
loot:
  # Maximum multiplier applied to magic-find-affected drop chances.
  # At the default 3.0, +200 magic_find (the point of 3× raw) is where further stacking stops.
  max-magic-find-multiplier: 3.0

# Natural mob spawning rules under plugins/rpg-core/natural-spawning/*.yml.
# Disabled by default — admin spawners are the canonical source until the world
# is built out enough that natural waves make sense.
natural-spawning:
  enabled: false
  interval-ticks: 20    # how often the spawner checks / spawns; 20 = once per second

# Mob AI overrides — how often the AI tick task runs (10 ticks = twice/sec).
mob-ai:
  interval-ticks: 10    # lower = more responsive AI, higher CPU cost; 10 is a good balance

# Combat tagging (see docs/core/damage.md).
# A player is "tagged" for N seconds after dealing or receiving damage.
# Vitality reduction: tagged players have reduced effective max-HP (simulates injury pressure).
combat-tag:
  duration-seconds: 8                          # seconds of combat tag after last damage event
  vitality-reduction-percent-per-point: 1      # % max-HP reduced per combat-tag stack
  vitality-reduction-cap-percent: 50           # maximum HP reduction from tagging (50 = can't go below 50% max-HP)

# Death rules — ordered list, first permission held wins.
# drop-coins-amount: a number, "all", or "<n>percent" (e.g. "50percent").
# drop-items-percent: percentage of inventory to drop on death (rolled per slot).
# keep-xp: keep skill XP since last level (true) or zero it (false).
death-rules:
  enabled: true
  coin-pile-pickup-radius: 1.5    # blocks; coin piles within this radius merge on pickup
  coin-pile-lifetime-seconds: 300 # seconds before unclaimed coin piles despawn (300 = 5 min)
  tiers:
    - permission: rpg.death.vip
      drop-items-percent: 0       # VIPs keep everything
      drop-coins-amount: 0
      keep-xp: true
    - permission: rpg.death.default
      drop-items-percent: 100     # 100% chance to drop each inventory slot
      drop-coins-amount: "50percent"  # drop half your wallet on death
      keep-xp: false

# Chat name format defaults (used by NameFormatter — LuckPerms is a soft-dep).
chat-name-format:
  use-luckperms-prefix: true    # prepend LuckPerms prefix before the player name
  use-luckperms-suffix: true    # append LuckPerms suffix after the player name
  fallback-format: "{name}"     # used when LuckPerms is not installed; supports {name}

# Locale for messages.yml selection (en is shipped; others come later).
locale: en

# Resource pack auto-delivery. Sends the pack to players when they join.
# Leave url blank to disable even if enabled: true.
resource-pack:
  enabled: false
  url: ""            # direct download URL (must be https and publicly reachable)
  sha1: ""           # hex SHA-1 of the pack ZIP; leave empty to skip hash check
  prompt: "&7This server uses a custom resource pack for the best experience."
  required: false    # true = kick players who decline

# Floating damage indicators (TextDisplay entities above the hit mob).
# Numbers spawn just above the victim's head and drift downward while shrinking.
damage-indicators:
  enabled: true
  duration-ticks: 30       # total life of the indicator in ticks (30 = 1.5 seconds)
  drop-blocks: 1.5         # how far the number drifts downward over its lifetime
  start-scale: 1.0         # initial text size (1.0 = normal)
  min-scale: 0.0           # final text size at the end of the animation (0.0 = invisible)

# Mob health bar shown in the mob's display name after each hit.
mob-health-bar:
  enabled: true
  bar-length: 10           # number of segments in the █░ bar (10 looks good in most fonts)

# Level scaling — reduces damage when players are much higher level than a mob.
# Applies to both player→mob and mob→player directions.
# per-level-gains control how a mob's stats grow with each level above 1.
#   health:         flat HP added per level  (e.g. level 5 mob gets +4 * 5 = 20 extra HP)
#   damage-percent: outgoing damage multiplied by 1 + (level-1) * X / 100 per level
#   defense:        effective defense points added per level (reduces incoming damage)
level-scaling:
  enabled: true
  threshold: 5              # level difference before scaling kicks in (e.g. player 10 vs mob 5 = 5 diff)
  reduction-per-level: 0.08 # damage multiplier reduction per level above threshold (0.08 = −8%/level)
  min-damage-factor: 0.10   # floor: never reduce below 10% of base damage
  per-level-gains:
    health: 5.0             # flat HP per level above 1
    damage-percent: 5.0     # % outgoing damage increase per level above 1
    defense: 2.0            # defense points per level above 1

# Attack cooldown — Minecraft's built-in attack charge system integration.
# Items can set AttackCooldown: N (ticks) to control their swing speed via the
# generic.attack_speed attribute. scale-damage applies the same formula Minecraft uses
# for the charge indicator: damage * (0.2 + 0.8 * charge^2).
attack-cooldown:
  scale-damage: true    # true = penalise spam-clicking; false = always full damage regardless of charge

# Stats formula tuning — controls how each raw stat point translates into a gameplay value.
# See docs/core/stats.md for the full formula reference.
stats:
  # Movement speed: each speed stat point adds this % to the vanilla base walk speed (0.1 b/tick).
  # speed: 12 with per-point 1.0 → 12% faster → 0.112 b/tick.
  speed-per-point: 1.0

  # Swing range: each swing_range stat point adds this many blocks to vanilla melee reach (3.0 b).
  # swing_range: 2 with per-point 1.0 → 5.0 block reach.
  swing-range-per-point: 1.0

# Passive ability tick rate — how often PASSIVE-trigger bindings fire on all online players.
abilities:
  passive-interval-ticks: 20   # 20 = once per second. Lower = more frequent regen/proc effects.
  zone:
    max-active: 50             # server-wide cap on concurrent zone{} effects. Prevents lag from
                               # players spamming zones. New zones are silently dropped when the
                               # cap is reached.
  spawn-mob:
    max-per-caster: 10         # max alive owned mobs (owned=true) per caster. Extra spawn_mob{}
                               # calls are silently ignored once the cap is reached.

# Ferocity extra swings.
ferocity:
  # Maximum extra melee hits that can be triggered by a single attack.
  # Prevents extreme ferocity values from dealing tens of hits in one tick.
  max-extra-hits: 10

# Bow / projectile settings.
bow:
  # projectile_speed stat divisor. The stat value is divided by this to produce a % multiplier.
  # Default 100: projectile_speed: 25 → 25% faster than vanilla (1.25× speed).
  # Lower this to make each stat point matter more; raise it to make the stat softer.
  projectile-speed-divisor: 100.0

# Per-player item drops — tags each dropped item with the player who earned it.
# Only the assigned player can pick it up until release-seconds elapses (then public).
# Holograms appear above drops showing item name and owner. Requires rpg-holograms or
# runs with built-in TextDisplay entities if not loaded.
per-player-drops:
  enabled: true
  release-seconds: 30   # seconds before drop becomes public and anyone can pick it up

# GUI styling — see docs/formatting.md for the full layout convention.
# All inventory GUIs in the suite read their pane materials/names from here.
# Changing these values reskins every GUI at once.
gui:
  background-material: GRAY_STAINED_GLASS_PANE  # fills empty/background slots (any Material name)
  border-material: BLACK_STAINED_GLASS_PANE      # bottom border row (extra space)
  background-name: " "                           # supports & color codes; " " = invisible name
  border-name: " "

# Main Menu persistent hotbar item.
# The item is given to every player on join and re-given if missing.
# It cannot be dropped or moved out of its slot.
main-menu:
  enabled: true
  slot: 8                 # hotbar slot (0 = far left, 8 = far right)
  material: COMPASS       # any valid Material name
  name: "&6✦ Menu &6✦"   # supports & color codes

# Debug logging per-system. Verbose builds are noisy — leave off in prod.
debug:
  damage: false
  spawning: false
  skills: false
  status-effects: false
  persistence: false
