# ════════════════════════════════════════════════════════════════════════════
#  ABILITY TRIGGER SHOWCASE
#  Demonstrates every PlayerAbilityTrigger type.
#  Obtain with: /rpg item give <id>
# ════════════════════════════════════════════════════════════════════════════

# ── ACTIVE: Multiple click bindings on one item ──────────────────────────────
# Right-click casts a mana-gated beam burst.
# Shift + right-click casts a wider, more expensive AoE.
phantom_blade:
  MinecraftItem: iron_sword
  Type: SWORD
  DisplayName: '&5Phantom Blade'
  AttackCooldown: 14
  Stats:
    damage: 45
    strength: 20
    intelligence: 40
    max_mana: 60
    crit_chance: 10
    crit_damage: 50
  Abilities:
  - "mana_cost{amount=25} cooldown{ticks=40} beam{range=12.0,damage_multiplier=1.5,particle=CRIT}"
  - "~shift_right_click mana_cost{amount=60} cooldown{ticks=80} explode{radius=5.0,damage_multiplier=1.2,falloff=linear}"
  Lore:
  - '&7Right-click: &dPhantom Beam &8(25 mana)'
  - '&7Shift + Right-click: &5Phase Burst &8(60 mana)'
  Rarity: '&5&lEPIC'

# ── PASSIVE: ON_HIT — procs when player deals damage ─────────────────────────
# Each melee hit has a chance to fire a lifesteal heal + heart particles.
# No mana cost — passive procs fire freely unless you add mana_cost{} explicitly.
vampiric_dagger:
  MinecraftItem: stone_sword
  Type: SWORD
  DisplayName: '&4Vampiric Dagger'
  AttackCooldown: 8
  Stats:
    damage: 22
    strength: 12
    lifesteal: 8
    crit_chance: 15
    crit_damage: 60
  Abilities:
  - "~on_hit heal{amount=5,target=caster} particles{type=HEART,count=4,spread=0.4}"
  Lore:
  - '&7Each hit drains life from the target.'
  Rarity: '&a&lUNCOMMON'

# ── PASSIVE: ON_HURT — procs when player receives damage ─────────────────────
# A chestplate that retaliates with particles and a sound effect when hit.
# Extend with apply_status{id=…} once you have a thorn/reflect status effect.
