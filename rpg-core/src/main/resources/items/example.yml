  Rarity: '&a&lUNCOMMON'

# ════════════════════════════════════════════════════════════════════════════
#  GATHERING TOOLS  — custom Type strings, skill-specific stats, breaking_power
# ════════════════════════════════════════════════════════════════════════════

# Type accepts any string. Non-builtin types become a CustomItemType.
# Use these types as filters in mob/block loot tables, station recipes, etc.

miners_pickaxe:
  MinecraftItem: iron_pickaxe
  Type: PICKAXE            # custom type — not a builtin; treated as "pickaxe"
  DisplayName: '&7Miner''s Pickaxe'
  Stats:
    breaking_power: 2      # must be >= block's RequiredPower to break it
    mining_speed: 12       # drains block Toughness faster
    mining_fortune: 10     # % extra drop rolls
    mining_wisdom: 5       # % more skill XP from mining
  Lore:
  - '&7A reliable pickaxe for ore veins up to Breaking Power 2.'
  Rarity: '&a&lUNCOMMON'

forest_axe:
  MinecraftItem: golden_axe
  Type: AXE
  DisplayName: '&2Forest Axe'
  Stats:
    breaking_power: 1
    foraging_speed: 10
    foraging_fortune: 8
    foraging_wisdom: 5
  Lore:
  - '&7Enchanted with the spirit of the old forest.'
  Rarity: '&7&lCOMMON'

farmers_hoe:
  MinecraftItem: diamond_hoe
  Type: HOE
  DisplayName: '&eFarmer''s Hoe'
  Stats:
    farming_fortune: 20
    farming_wisdom: 8
  Lore:
  - '&7Blesses the soil with every strike.'
  Rarity: '&7&lCOMMON'

golden_fishing_rod:
  MinecraftItem: fishing_rod
  Type: ROD
  DisplayName: '&6Golden Fishing Rod'
  Stats:
    fishing_speed: 15          # shortens bite wait time
    fishing_fortune: 25        # % extra loot rolls
    sea_creature_chance: 8     # % chance to hook a sea creature instead
    fishing_wisdom: 10
  Lore:
  - '&7Cast into deep water and await the extraordinary.'
  Rarity: '&9&lRARE'

# ════════════════════════════════════════════════════════════════════════════
#  CONSUMABLES  — OnConsume effects, ItemCooldown
# ════════════════════════════════════════════════════════════════════════════

strength_elixir:
  MinecraftItem: potion
  Type: CONSUMABLE
  DisplayName: '&cStrength Elixir'
  # ItemCooldown: 1200 ticks = 60 s before the item can be used again (per player)
  ItemCooldown: 1200
  # OnConsume.Effects list: each entry applies a status effect on right-click.
  # effect   → status effect ID from status-effects/*.yml
  # level    → scales stat-modifier values and tick-action amounts
  # duration → ticks the effect lasts (20 ticks = 1 second)
  OnConsume:
    Effects:
    - effect: strength_boost
      level: 1
      duration: 1200     # 60 seconds
    - effect: regen
      level: 2
      duration: 400      # 20 seconds
  Lore:
  - '&7A crimson draught that surges with raw power.'
  - '&7Grants &cStrength Boost &7and &aRegeneration&7.'
  Rarity: '&a&lUNCOMMON'

antidote_flask:
  MinecraftItem: glass_bottle
  Type: CONSUMABLE
  DisplayName: '&2Antidote Flask'
  ItemCooldown: 200          # 10-second cooldown
  OnConsume:
    Effects:
    - effect: regen
      level: 3
      duration: 600          # 30 seconds of fast healing
  Lore:
  - '&7Clears poison and restores vitality over time.'
  Rarity: '&7&lCOMMON'

# ════════════════════════════════════════════════════════════════════════════
#  UPGRADES  — UPGRADE type, Tradeable: false (bound to one item)
# ════════════════════════════════════════════════════════════════════════════

enchanted_upgrade_crystal:
  MinecraftItem: amethyst_shard
