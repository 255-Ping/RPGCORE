    mana_regen: 10
    max_health: 20
  Abilities:
  - "~passive heal{amount=1,target=caster}"
  Lore:
  - '&7Woven from condensed mana thread.'
  - '&7Quietly restores the wearer''s health over time.'
  Rarity: '&9&lRARE'

