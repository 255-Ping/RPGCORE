  Tradeable: false
  Stats:
    enchanting_luck: 15    # % bonus to enchanting success (when used on anvil station)
  Lore:
  - '&7Apply at the &5Enchanting Anvil &7to attempt an upgrade.'
  - '&7This crystal is &cbound &7and cannot be traded.'
  Rarity: '&9&lRARE'

# ════════════════════════════════════════════════════════════════════════════
#  ACCESSORIES  — rings, amulets, talismans, CustomModelData, loot/wisdom stats
# ════════════════════════════════════════════════════════════════════════════

adventurers_ring:
