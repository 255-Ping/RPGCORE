#  CONSUMABLES  — OnConsume effects, ItemCooldown
# ════════════════════════════════════════════════════════════════════════════

strength_elixir:
  MinecraftItem: potion
  Type: CONSUMABLE
  DisplayName: '&cStrength Elixir'
  # ItemCooldown: 1200 ticks = 60 s before the item can be used again (per player)
  ItemCooldown: 1200
  # OnConsume.Effects list: each entry applies a status effect on right-click.
  # effect   → status effect ID from status-effects/*.yml
  # level    → scales stat-modifier values and tick-action amounts
  # duration → ticks the effect lasts (20 ticks = 1 second)
  OnConsume:
    Effects:
    - effect: strength_boost
      level: 1
      duration: 1200     # 60 seconds
    - effect: regen
      level: 2
      duration: 400      # 20 seconds
  Lore:
  - '&7A crimson draught that surges with raw power.'
  - '&7Grants &cStrength Boost &7and &aRegeneration&7.'
  Rarity: '&a&lUNCOMMON'

antidote_flask:
