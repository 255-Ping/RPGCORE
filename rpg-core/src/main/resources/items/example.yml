# Example items shipped with rpg-core. Each top-level key is an item ID.
# Reload live with /rpg reloadall.
#
# ── All supported fields ────────────────────────────────────────────────────
#   MinecraftItem    — base Material (stone, iron_sword, leather_helmet, ...)
#   Type             — SWORD | BOW | CROSSBOW | WAND | ARMOR | MATERIAL |
#                      CONSUMABLE | UPGRADE | QUEST | ACCESSORY
#                      Any other string becomes a CustomItemType (e.g. PICKAXE, ROD)
#   DisplayName      — optional; legacy &-codes; defaults to the item ID
#   Lore             — list of extra lore lines (shown after stats, before rarity)
#   Rarity           — full colored bottom-of-lore line, e.g. '&6&lLEGENDARY'
#   CustomModelData  — integer; use your resource-pack model range
#   ArmorSlot        — HELMET | CHESTPLATE | LEGGINGS | BOOTS  (for Type: ARMOR)
#   Tradeable        — true (default) | false → blocks /trade, Bazaar, AH
#   AttackCooldown   — ticks between full-charge melee attacks (0 = Minecraft default)
#   ItemCooldown     — ticks before the item can be used again (wands/consumables/bows)
#   AmmoType         — custom item ID required in inventory to fire a bow; omit for vanilla arrows
#   InfiniteAmmo     — true → bow fires without consuming any ammo at all
#   ProjectileType   — entity type the bow/crossbow launches; default ARROW
#                      Valid: ARROW | SPECTRAL_ARROW | SNOWBALL | EGG | SMALL_FIREBALL | TRIDENT
#   Stats            — map of stat-id: value (see all stat IDs below)
#   Abilities        — list of ability bindings. Prefix a line with ~trigger to set its trigger:
#                        "ability_id"                   → right_click (default, backwards compat)
#                        "~right_click ability_id"      → right_click (explicit)
#                        "~left_click ability_id"       → left_click
#                        "~shift_right_click ability_id"
#                        "~shift_left_click ability_id"
#                        "~on_hit drain{amount=5}"      → proc on dealing damage (passive, no mana cost by default)
#                        "~on_hurt particles{type=crit}"→ proc on receiving damage
#                        "~on_jump particles{type=cloud}"
#                        "~passive heal{amount=2}"      → ticking (every abilities.passive-interval-ticks)
#                      Multiple ~triggers on the same item are allowed.
#   SetId            — id of an armor set in sets/*.yml that this item counts toward
#   OnConsume        — right-click consumable effects:
#     Effects:
#     - effect: <status-effect-id>   # defined in status-effects/*.yml
#       level: 1
#       duration: 200                # ticks (200 = 10 s)
#
# ── Stat IDs (grouped) ──────────────────────────────────────────────────────
#   Combat:    damage  strength  crit_chance  crit_damage
#              attack_speed  ferocity  lifesteal  knockback
#              ammo_usage_reduction  projectile_speed  auto_loot
#   Survival:  max_health  health_regen  vitality  defense  true_defense
#   Caster:    max_mana  mana_regen  intelligence  cooldown_reduction
#   Mobility:  speed  swing_range
#   Loot:      magic_find  auto_loot
#   Gathering: breaking_power
#   Skills:    mining_speed  mining_fortune  foraging_speed  foraging_fortune
#              farming_fortune  fishing_speed  fishing_fortune  sea_creature_chance
#   Wisdom:    combat_wisdom  mining_wisdom  foraging_wisdom  farming_wisdom
#              fishing_wisdom  cooking_wisdom  alchemy_wisdom  enchanting_wisdom
#
# ── Rarity color codes ──────────────────────────────────────────────────────
#   Common &7&l  Uncommon &a&l  Rare &9&l  Epic &5&l
#   Legendary &6&l  Mythic &d&l  Special &e&l

