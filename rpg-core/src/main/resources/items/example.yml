  Type: ACCESSORY
  DisplayName: '&6Adventurer''s Ring'
  # CustomModelData: integer used by a resource pack to select a custom model.
  # This example assumes model ID 1001 in your pack displays a ring texture.
  CustomModelData: 1001
  Stats:
    max_health: 20
    strength: 10
    mining_speed: 8
    speed: 3
  Lore:
  - '&7A simple ring worn by countless adventurers.'
  - '&7Balanced bonuses for any profession.'
  Rarity: '&a&lUNCOMMON'

scholars_pendant:
  MinecraftItem: book
  Type: ACCESSORY
  DisplayName: '&3Scholar''s Pendant'
  CustomModelData: 1002
  Stats:
    # Full wisdom suite — all eight skill wisdom stats in one item
    combat_wisdom: 5
    mining_wisdom: 5
    foraging_wisdom: 5
    farming_wisdom: 5
    fishing_wisdom: 5
    cooking_wisdom: 5
    alchemy_wisdom: 5
    enchanting_wisdom: 5
    # Bonus caster stats
    intelligence: 50
    max_mana: 40
  Lore:
  - '&7Worn by the most dedicated scholars of the realm.'
  - '&7Increases all skill XP gains by &b+5% &7each.'
  Rarity: '&6&lLEGENDARY'

pristine_talisman:
  MinecraftItem: nether_star
  Type: ACCESSORY
  DisplayName: '&d&lPristine Talisman'
  Stats:
    magic_find: 40         # % bonus rare-drop chance
    pristine: 25           # % bonus to item quality rolls
    pet_luck: 20           # % bonus pet drop chance
    auto_loot: 1           # automatically picks up nearby drops (flat radius bonus)
    enchanting_luck: 10    # % enchanting success bonus
  Lore:
  - '&7A talisman of extraordinary fortune.'
  - '&7All the luck of the cosmos, bound into one gem.'
  Rarity: '&5&lEPIC'

