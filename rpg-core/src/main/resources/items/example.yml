  Lore:
  - '&7Refined from red gem ore.'
  Rarity: '&c&lUNCOMMON'

# ════════════════════════════════════════════════════════════════════════════
#  SWORDS  — melee weapon stats, AttackCooldown, multiple abilities
# ════════════════════════════════════════════════════════════════════════════

iron_shortsword:
  MinecraftItem: iron_sword
  Type: SWORD
  DisplayName: '&fIron Shortsword'
  # AttackCooldown: ticks between full-power attacks (20 = 1 s). 0 = Minecraft default.
  AttackCooldown: 10
  Stats:
    damage: 18
    strength: 8
    crit_chance: 5       # % — shown as +5%
    crit_damage: 30      # % — shown as +30%
    lifesteal: 2         # %
    knockback: 10        # velocity force applied to mobs on hit
  Lore:
  - '&7A reliable shortsword forged from iron ingots.'
  Rarity: '&7&lCOMMON'

voidblade:
  MinecraftItem: netherite_sword
  Type: SWORD
  DisplayName: '&5&lVoidblade'
  AttackCooldown: 14
  # Tradeable: false → rejected by /trade, Bazaar, AH; shows &c✘ Not Tradeable in lore
  Tradeable: false
  Stats:
    damage: 120
    strength: 90
    crit_chance: 30
    crit_damage: 180
    ferocity: 60         # % extra swings
    lifesteal: 20
    swing_range: 2       # extra reach in blocks
    knockback: 25
  # Multiple ability IDs — each fires in sequence on right-click
  Abilities:
  - testability
  - poison_dart
  Lore:
  - '&7A blade forged in the void between worlds.'
  - '&7&oIt hungers for souls.'
  Rarity: '&d&lMYTHIC'

# ════════════════════════════════════════════════════════════════════════════
#  BOWS  — ranged stats, AmmoType, ammo_usage_reduction
# ════════════════════════════════════════════════════════════════════════════

hunters_bow:
  MinecraftItem: bow
  Type: BOW
  DisplayName: '&aHunter''s Longbow'
  # ItemCooldown: ticks before this item can be right-clicked again
  ItemCooldown: 5
  # AmmoType: custom item ID that must be in the player's inventory to fire.
  # Omit (or leave blank) to require vanilla arrows.
  # AmmoType: enchanted_arrow
  Stats:
    damage: 35
    crit_chance: 18
    crit_damage: 90
    projectile_speed: 25     # flat bonus to launch speed
    ammo_usage_reduction: 20 # % chance to not consume an arrow
    knockback: 12            # applied to mobs on arrow hit
  Lore:
  - '&7Carved from a single branch of ancient oak.'
  - '&7Has a small chance to conserve ammo on each shot.'
  Rarity: '&9&lRARE'

# ════════════════════════════════════════════════════════════════════════════
#  CROSSBOWS  — InfiniteAmmo, ProjectileType
# ════════════════════════════════════════════════════════════════════════════

snowstorm_crossbow:
  MinecraftItem: crossbow
  Type: CROSSBOW
  DisplayName: '&bSnowstorm Crossbow'
  # InfiniteAmmo: fires without consuming any ammo at all
  InfiniteAmmo: true
  # ProjectileType: entity spawned on fire. Options:
  #   ARROW | SPECTRAL_ARROW | SNOWBALL | EGG | SMALL_FIREBALL | TRIDENT
  ProjectileType: SNOWBALL
  Stats:
    damage: 30
    knockback: 4          # flat knockback force
    crit_chance: 12
    crit_damage: 60
  Abilities:
  - poison_dart           # on-hit: fires a poison beam at target
  Lore:
  - '&7Launches an endless volley of magical snowballs.'
  - '&7Each hit has a chance to chill the target.'
  Rarity: '&5&lEPIC'

# ════════════════════════════════════════════════════════════════════════════
#  WANDS  — full caster stats, cooldown_reduction
# ════════════════════════════════════════════════════════════════════════════

glacial_staff:
  MinecraftItem: blaze_rod
  Type: WAND
  DisplayName: '&b&lGlacial Staff'
  ItemCooldown: 8
  Stats:
    damage: 50               # spell power — multiplied by ability damage_multiplier params
    intelligence: 120        # flat mana pool + ability scaling
    max_mana: 80
    mana_regen: 5
    cooldown_reduction: 15   # % shorter cooldowns on all abilities
    knockback: 8
  Abilities:
  - testability
  Lore:
  - '&7Channelling arctic energy, this staff can conjure'
  - '&7devastating ice formations from thin air.'
  Rarity: '&6&lLEGENDARY'

# ════════════════════════════════════════════════════════════════════════════
#  ARMOR — ArmorSlot, survival + caster stats, all four pieces
# ════════════════════════════════════════════════════════════════════════════

reinforced_helmet:
  MinecraftItem: iron_helmet
  Type: ARMOR
