  - '&7Sturdy iron plates reinforced with leather padding.'
  Rarity: '&a&lUNCOMMON'

arcane_chestplate:
  MinecraftItem: diamond_chestplate
  Type: ARMOR
  ArmorSlot: CHESTPLATE
  DisplayName: '&9Arcane Chestplate'
  Stats:
    defense: 55
    true_defense: 10         # blocks % of damage that bypasses normal defense
    max_mana: 60
    intelligence: 40
    mana_regen: 3
  Lore:
  - '&7Inscribed with runes that fortify both body and mind.'
  Rarity: '&9&lRARE'

shadow_leggings:
  MinecraftItem: leather_leggings
  Type: ARMOR
  ArmorSlot: LEGGINGS
  DisplayName: '&8Shadow Leggings'
  Stats:
    defense: 25
    speed: 5                 # flat movement speed bonus
    crit_chance: 8
    vitality: 5              # % max health bonus
  Lore:
  - '&7Woven from shadow-thread; light as air, tough as iron.'
  Rarity: '&a&lUNCOMMON'

windwalker_boots:
  MinecraftItem: leather_boots
  Type: ARMOR
  ArmorSlot: BOOTS
  DisplayName: '&eWindwalker Boots'
  Stats:
    defense: 20
    speed: 12
    magic_find: 15           # % bonus chance for rare drops
