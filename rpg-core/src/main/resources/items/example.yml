  MinecraftItem: iron_chestplate
  Type: ARMOR
  ArmorSlot: CHESTPLATE
  DisplayName: '&2Thorns Chestplate'
  Stats:
    defense: 40
    max_health: 30
    true_defense: 5
  Abilities:
  - "~on_hurt particles{type=CRIT,count=12,spread=0.6} sound{key=entity.blaze.hurt,volume=0.6,pitch=1.2}"
  Lore:
  - '&7Retaliates with thorny energy when struck.'
  Rarity: '&9&lRARE'

# ── PASSIVE: ON_JUMP — procs each time the player jumps ──────────────────────
springheel_boots:
  MinecraftItem: leather_boots
  Type: ARMOR
  ArmorSlot: BOOTS
  DisplayName: '&eSpringheel Boots'
  Stats:
    defense: 12
    speed: 10
    crit_chance: 5
  Abilities:
  - "~on_jump particles{type=CLOUD,count=8,spread=0.5} sound{key=entity.firework_rocket.launch,volume=0.4,pitch=1.6}"
  Lore:
  - '&7Leaves a cloud of energy with every leap.'
  Rarity: '&a&lUNCOMMON'

# ── PASSIVE: PASSIVE — ticks every abilities.passive-interval-ticks (default 20) ──
# Robes that slowly regenerate 1 HP per second while worn.
# Stack with health_regen stat for continuous recovery builds.
sorcerers_robes:
  MinecraftItem: leather_chestplate
  Type: ARMOR
  ArmorSlot: CHESTPLATE
  DisplayName: '&bSorcerer''s Robes'
  Stats:
    defense: 15
    intelligence: 70
