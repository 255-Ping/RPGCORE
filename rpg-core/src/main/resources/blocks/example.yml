# Sample custom blocks. Each top-level key is a block ID. Reload with /rpg reloadall.
#
# Place by running either:
#   /rpg block give <blockId>         — gives an admin item that auto-registers on place
#   /rpg block convert <radius> <fromMaterial> <toBlockId>
#     — scans vanilla blocks of <fromMaterial> within <radius> and bulk-tags them.
#
# Fields:
#   MinecraftBlock     — base Material placed in the world (REDSTONE_ORE, GOLD_BLOCK, etc.)
#   Toughness          — block HP; MINING_SPEED stat drains this per-tick while held-click
#   RequiredPower      — BREAKING_POWER stat must be >= this value to break the block
#   RequiredToolType   — pickaxe | axe | shovel | hoe | any | none
#   RespawnTicks       — ticks until the block regenerates after being broken (0 = no respawn)
#   RespawnPlaceholder — Material shown at the location while the block is regenerating
#   Interactable       — true if right-click opens a station GUI (requires StationType)
#   StationType        — cooking | brewing | enchanting | anvil (opens the corresponding GUI)
#   Drops              — list of "[file] <itemId> <min>[-<max>]"; file token optional/decorative
#   XP                 — skill XP awarded on break (0 = fall back to the skill addon's default-xp)
#   Hologram           — optional text displayed above every placed instance of this block.
#                        Supports & color codes. Omit or leave empty for no hologram.
#                        Example: Hologram: "&6⚗ Brewing Station"
#   HologramYOffset    — Y offset in blocks above the block's top surface (default 1.2)

red_gem_block:
  MinecraftBlock: redstone_ore
  Toughness: 50              # ~5s with mining_speed 10
  RequiredPower: 1
  RequiredToolType: pickaxe
  RespawnTicks: 600
  RespawnPlaceholder: bedrock
  Drops:
  - gems red_gem 1-3
  - vanilla:redstone 2-4

iron_node:
  MinecraftBlock: iron_ore
  Toughness: 100             # ~10s with mining_speed 10
  RequiredPower: 2
  RequiredToolType: pickaxe
  RespawnTicks: 400
  RespawnPlaceholder: stone
  Drops:
  - vanilla:raw_iron 1-2
