# Sample status effects shipped with rpg-core. Add files in this folder; each
# top-level key is an effect ID. Reload with /rpg reloadall.
#
# Fields:
#   display         — colored display name (legacy &-codes)
#   category        — buff | debuff | neutral
#   stacking        — refresh | stack-power | take-max | independent
#   hidden          — if true, doesn't show in the /effects GUI or HUD
#   stat-modifiers  — map of stat-id -> { kind: flat | percent, value: <n> }
#                     flat values add directly; percent values are applied as
#                     percentage modifiers (-10 means -10%).
#                     Effect level multiplies the modifier value.
#   tick            — optional periodic action while active:
#       interval-ticks: how often (20 = 1 sec)
#       action:        damage | heal
#       amount:        the damage / heal amount per tick (also scaled by level)
#       source:        tag for the damage pipeline (only used for action: damage)

poison:
  display: "&2Poison"
  category: debuff
  stacking: refresh
  hidden: false
  stat-modifiers:
    defense: { kind: percent, value: -10 }
  tick:
    interval-ticks: 20
    action: damage
    amount: 2
    source: poison

regen:
  display: "&aRegeneration"
  category: buff
  stacking: refresh
  hidden: false
  tick:
    interval-ticks: 10
    action: heal
    amount: 1

strength_boost:
  display: "&cStrength Boost"
  category: buff
  stacking: take-max
  hidden: false
  stat-modifiers:
    strength: { kind: flat, value: 25 }

slow:
  display: "&7Slowness"
  category: debuff
  stacking: take-max
  hidden: false
  stat-modifiers:
    speed: { kind: percent, value: -30 }

# ── Catalog additions ──────────────────────────────────────────────────────────

burning:
  display: "&6🔥 Burning"
  category: debuff
  stacking: refresh
  hidden: false
  tick:
    interval-ticks: 20
    action: damage
    amount: 3
    source: fire
  on-apply:
    particles:
      type: FLAME
      count: 8
      spread: 0.3

frozen:
  display: "&b❄ Frozen"
  category: debuff
  stacking: refresh
  hidden: false
  stat-modifiers:
    speed: { kind: percent, value: -80 }
  on-apply:
    particles:
      type: SNOWFLAKE
      count: 10
      spread: 0.3

# Silenced has no stat mods — the ability listener enforces it in code.
silenced:
  display: "&8Silenced"
  category: debuff
  stacking: refresh
  hidden: false

haste:
  display: "&eHaste"
  category: buff
  stacking: take-max
  hidden: false
  stat-modifiers:
    mining_speed: { kind: percent, value: 50 }

# ── Additional debuffs ─────────────────────────────────────────────────────────

weakness:
  display: "&cWeakness"
  category: debuff
  stacking: take-max
  hidden: false
  stat-modifiers:
    damage: { kind: percent, value: -30 }
    strength: { kind: flat, value: -20 }

vulnerability:
  display: "&4Vulnerability"
  category: debuff
  stacking: refresh
  hidden: false
  stat-modifiers:
    defense: { kind: percent, value: -35 }
    true_defense: { kind: flat, value: -10 }

# mana_drain collapses the target's mana pool and regen so casters run dry fast.
# (Tick actions only support HP damage/heal; mana drain is handled via stat modifiers.)
mana_drain:
  display: "&5Mana Drain"
  category: debuff
  stacking: refresh
  hidden: false
  stat-modifiers:
    max_mana: { kind: percent, value: -40 }
    mana_regen: { kind: percent, value: -80 }

blindness:
  display: "&8Blindness"
  category: debuff
  stacking: refresh
  hidden: false
  # No direct vision API — simulated via aim/luck penalties.
  stat-modifiers:
    crit_chance: { kind: percent, value: -60 }
    magic_find: { kind: percent, value: -40 }

# ── Additional buffs ───────────────────────────────────────────────────────────

speed_boost:
  display: "&aSpeed Boost"
  category: buff
  stacking: take-max
  hidden: false
  stat-modifiers:
    speed: { kind: percent, value: 40 }

# thorns: reflect damage back to attackers when struck.
# The retaliation mechanic is enforced in code via a StatusEffectService hook;
# this entry defines the display, category, and a passive defense bonus.
thorns:
  display: "&2Thorns"
  category: buff
  stacking: refresh
  hidden: false
  stat-modifiers:
    defense: { kind: flat, value: 20 }
    true_defense: { kind: flat, value: 5 }
