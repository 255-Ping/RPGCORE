# ============================================================
# Example Armor Set — Berserker's Set
# ============================================================
#
# Wearing 2+ pieces: +25 ferocity  (purely passive — no trigger needed)
# Wearing 4 pieces (full set): +75 ferocity +50 damage, vampiric on-hit drain
#
# Stats in a set bonus are ALWAYS passive. You get them just by wearing the armor;
# no proc or trigger is required. Abilities are optional and only needed when you
# want an effect that fires on an event (on_hit, on_hurt, passive, etc.).
#
# This file is auto-generated on first startup. Remove or replace it with your own sets.
# Full docs: docs/core/armor-sets.md
# ============================================================

berserker_set:
  Name: "&c&lBerserker's Set"
  Pieces:
    - berserker_helmet
    - berserker_chestplate
    - berserker_leggings
    - berserker_boots

  Bonuses:

    # 2/4 pieces: partial set — pure stat bonus, nothing to trigger
    2:
      Stats:
        ferocity: 25

    # 4/4 pieces: full set — stats plus vampiric on-hit drain
    4:
      Stats:
        ferocity: 75
        damage: 50
      Abilities:
        - "~on_hit drain{amount=10, leech=1.0}"


# ============================================================
# Scale-based example — use Scale to auto-derive weaker tiers
# instead of writing effects twice.
# ============================================================

flame_set:
  Name: "&6&lFlame Walker's Set"
  Pieces:
    - flame_helmet
    - flame_chestplate
    - flame_leggings
    - flame_boots

  Bonuses:

    # 2/4 — Scale: 0.5 halves all numeric params in Abilities at load time.
    # "~on_hurt heal{amount=10}" becomes "~on_hurt heal{amount=5}" automatically.
    2:
      Stats:
        health_regen: 5
      Scale: 0.5
      Abilities:
        - "~on_hurt heal{amount=10}"

    # 4/4 — full values as written.
    4:
      Stats:
        health_regen: 15
      Abilities:
        - "~on_hurt heal{amount=10}"
        - "~passive heal{amount=2}"
