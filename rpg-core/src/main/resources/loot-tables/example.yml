# Example shared loot table. Add as many *.yml files as you like — each top-level
# key is a table ID. Mobs can reference a table by ID instead of embedding the
# full LootTable: section inline:
#
#   LootTable: forest_common
#
# Fields are identical to the inline LootTable: schema on mobs.
# Reload with /rpg reloadall.

forest_common:
  attribution: weighted-by-damage   # last-hit | top-damager | split-equal | weighted-by-damage
  roll-mode: per-player             # per-player | shared
  exp: 10                           # vanilla XP orbs spawned at corpse
  combat-exp: 30                    # combat skill XP awarded to each eligible player
  combat-skill: combat              # skill ID — defaults to "combat"
  rolls:
    - { item: stick,   chance: 50.0, min: 1, max: 3 }
    - { item: leather, chance: 25.0, min: 1, max: 1, magic-find-affected: true }
  guaranteed:
    - { item: bone, min: 1, max: 1 }
  currency-rolls:
    - { chance: 100.0, min: 5, max: 20 }
