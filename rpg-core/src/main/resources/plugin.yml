name: rpg-core
version: '${version}'
main: com.github._255_ping.rpg.core.RpgCorePlugin
api-version: '26.1.2'
load: POSTWORLD
authors: [Ping]
description: Core RPG framework — stats, items, abilities, mobs, damage pipeline.
softdepend: [LuckPerms]
commands:
  rpg:
    description: RPG suite admin / debug command
    usage: /rpg <version|reload>
permissions:
  rpg.core.version:
    description: View loaded modules and versions
    default: true
  rpg.core.reload-all:
    description: Reload core config and messages
    default: op
