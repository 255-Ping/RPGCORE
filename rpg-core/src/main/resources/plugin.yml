name: rpg-core
version: '${version}'
main: com.github._255_ping.rpg.core.RpgCorePlugin
api-version: '26.1.2'
load: POSTWORLD
authors: [Ping]
description: Core RPG framework — stats, items, abilities, mobs, damage pipeline.
softdepend: [LuckPerms]
# Paper resolves these from Maven Central at runtime, so we don't need to shade them.
libraries:
  - com.mysql:mysql-connector-j:9.0.0
  - com.zaxxer:HikariCP:6.0.0
commands:
  rpg:
    description: RPG suite admin / debug command
    usage: /rpg <version|reload|item|mob|block>
  stats:
    description: Show your effective stats
    usage: /stats [player]
  skill:
    description: Show your skill levels and XP
    aliases: [skills]
    usage: /skill [player]
  effects:
    description: Show your active status effects
    aliases: [potion, potions]
    usage: /effects [player]
  spawner:
    description: Admin spawner management
    usage: /spawner <create|delete|list|tp|set>
  achievements:
    description: View your achievements
    aliases: [ach, achievement]
    usage: /achievements [player]
permissions:
  rpg.core.version:
    description: View loaded modules and versions
    default: true
  rpg.core.reload-all:
    description: Reload core config and messages
    default: op
  rpg.core.item.give:
    description: Give a custom item to a player
    default: op
  rpg.core.mob.spawn:
    description: Spawn a custom mob at your location
    default: op
  rpg.core.block.give:
    description: Give a placeable custom block
    default: op
  rpg.core.block.convert:
    description: Bulk-convert vanilla blocks to a custom block in a radius
    default: op
  rpg.core.wand:
    description: Use the selection wand subcommand
    default: op
  rpg.core.loot-chest:
    description: Manage loot chest bindings
    default: op
  rpg.core.particle:
    description: Spawn debug particle effects via /rpg particle
    default: op
  rpg.core.stats:
    description: Show your effective stats
    default: true
  rpg.core.stats.other:
    description: Show another player's effective stats
    default: op
  rpg.core.skill:
    description: Show your skill levels
    default: true
  rpg.core.skill.other:
    description: Show another player's skill levels
    default: op
  rpg.core.effects:
    description: Show your active status effects
    default: true
  rpg.core.effects.other:
    description: Show another player's active status effects
    default: op
  rpg.core.fix:
    description: Clear stuck movement-speed debuffs and resync stats for self or another player
    default: op
  rpg.core.achievements:
    description: View your own achievements
    default: true
  rpg.core.achievements.others:
    description: View another player's achievements
    default: op
  rpg.spawners.admin.create:
    description: Create a spawner
    default: op
  rpg.spawners.admin.delete:
    description: Delete a spawner
    default: op
  rpg.spawners.admin.list:
    description: List spawners
    default: op
  rpg.spawners.admin.tp:
    description: Teleport to a spawner
    default: op
  rpg.spawners.admin.edit:
    description: Edit a spawner's settings
    default: op
