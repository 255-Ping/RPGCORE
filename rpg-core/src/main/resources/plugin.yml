name: rpg-core
version: '${version}'
main: com.github._255_ping.rpg.core.RpgCorePlugin
api-version: '26.1.2'
load: POSTWORLD
authors: [Ping]
description: Core RPG framework — stats, items, abilities, mobs, damage pipeline.
softdepend: [LuckPerms]
commands:
  rpg:
    description: RPG suite admin / debug command
    usage: /rpg <version|reload|item|mob|block>
  stats:
    description: Show your effective stats
    usage: /stats [player]
  skill:
    description: Show your skill levels and XP
    aliases: [skills]
    usage: /skill [player]
  effects:
    description: Show your active status effects
    aliases: [potion, potions]
    usage: /effects [player]
permissions:
  rpg.core.version:
    description: View loaded modules and versions
    default: true
  rpg.core.reload-all:
    description: Reload core config and messages
    default: op
  rpg.core.item.give:
    description: Give a custom item to a player
    default: op
  rpg.core.mob.spawn:
    description: Spawn a custom mob at your location
    default: op
  rpg.core.block.give:
    description: Give a placeable custom block
    default: op
  rpg.core.block.convert:
    description: Bulk-convert vanilla blocks to a custom block in a radius
    default: op
  rpg.core.stats:
    description: Show your effective stats
    default: true
  rpg.core.stats.other:
    description: Show another player's effective stats
    default: op
  rpg.core.skill:
    description: Show your skill levels
    default: true
  rpg.core.skill.other:
    description: Show another player's skill levels
    default: op
  rpg.core.effects:
    description: Show your active status effects
    default: true
  rpg.core.effects.other:
    description: Show another player's active status effects
    default: op
