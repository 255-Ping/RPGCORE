# Sample mobs shipped with rpg-core. Each top-level key is a mob ID.
# Spawn via: /rpg mob spawn <id> [count]
#
# Fields:
#   MinecraftMob — base EntityType (zombie, skeleton, blaze, ...)
#   DisplayName  — optional, shown above the mob
#   Health       — max HP (also sets MAX_HEALTH attribute)
#   Damage       — base melee damage
#   Armor        — armor value; mapped to the DEFENSE stat for our pipeline
#   XP           — vanilla XP orbs dropped on death (in addition to pool/table exp values)
#   Stats        — bonus stat map (additive on top of damage/armor)
#   Equipment    — list of "<SLOT> <itemId>" — HELMET / CHEST / LEGS /
#                  BOOTS / HAND / OFFHAND. itemId resolves via item registry
#                  first, falls back to a vanilla Material.
#   Abilities    — list of ability invocations + trigger suffix
#                  (~onTimer:N | ~onHit | ~onHurt | ~onSpawn | ~onDeath).
#                  No trigger = ~onSpawn.
#   LootPool     — single named pool ID (defined in loot-pools/*.yml).
#   LootPools    — list of pool IDs; each rolls independently on death.
#   LootTable    — inline drop table (optional; rolls alongside any LootPool references):
#                    attribution: last-hit | top-damager | split-equal | weighted-by-damage
#                    roll-mode:   per-player | shared
#                    exp:         vanilla XP orbs from this table (default 0)
#                    combat-exp:  skill XP awarded to all damagers (default 0)
#                    combat-skill: skill id for combat-exp (default "combat")
#                    rolls:       list of { item, chance (%), min, max, magic-find-affected }
#                    guaranteed:  list of { item, min, max }
#                    currency-rolls: list of { chance (%), min, max } — deposited directly to
#                                    each eligible player's balance (requires rpg-economy)

testmob:
  MinecraftMob: zombie
  DisplayName: '&cTest Zombie'
  Health: 50
  Damage: 5
  Armor: 1
  Equipment:
  - HELMET leather_helmet
  - CHEST leather_chestplate
  - LEGS leather_leggings
  - BOOTS leather_boots
  - HAND stone_sword
  Abilities:
  - particles{type=flame,count=8} ~onSpawn
  - explode{radius=5,damage_multiplier=0.5,particle=flame} ~onTimer:100
  # Named pool — defined in loot-pools/example.yml.
  # Drop contents live in one place; any mob can reference the same pool.
  LootPool: basic_mob_drops

mini_boss:
  MinecraftMob: zombified_piglin
  DisplayName: '&5Mini Boss'
  Health: 500
  Damage: 20
  Armor: 30
  Stats:
    crit_chance: 25
    crit_damage: 100
  Equipment:
  - HAND iron_sword
  Abilities:
  - sound{key=entity.wither.spawn,volume=1.0,pitch=0.5} ~onSpawn
  - particles{type=large_smoke,count=15} ~onHurt
  # Two pools: boss_drops is the main table, elite_bonus_drops adds extra rare rolls.
  # Both roll independently — the boss can drop from both on the same kill.
  LootPools:
  - boss_drops
  - elite_bonus_drops

# ─────────────────────────────────────────────────────────────────────────────
# ABILITY PATTERN SHOWCASE
# Each mob below demonstrates a specific ability composition using the full
# built-in effect library. Spawn with: /rpg mob spawn <id>
# ─────────────────────────────────────────────────────────────────────────────

# Pattern: zone on spawn + freeze on hit + knockback retaliation
# The frost golem immediately creates a cold denial zone and freezes anything
# it touches. Getting hit pushes attackers away, making it hard to melee safely.
frost_golem:
  MinecraftMob: iron_golem
  DisplayName: '&bFrost Golem'
  Health: 400
  Damage: 18
  Armor: 25
  Abilities:
  - "zone{radius=5.0,duration=600,interval=20,damage=6.0,particle=SNOWFLAKE} sound{key=entity.player.hurt_freeze,volume=1.0,pitch=0.8} ~onSpawn"
  - "freeze{duration=80,amplifier=4} ~onHit"
  - "knockback{force=1.4,up=0.3,direction=away} ~onHurt"
  LootPool: basic_mob_drops

# Pattern: beam + chain bounce on timer + death explosion
# The chain wraith is a fragile ranged mob. Every 3 seconds it fires a beam
# that bounces chain-lightning to nearby players. Dying triggers an AoE burst.
chain_wraith:
  MinecraftMob: phantom
  DisplayName: '&5Chain Wraith'
  Health: 120
  Damage: 10
  Armor: 5
  Abilities:
  - "particles{type=ENCHANT,count=20,spread=0.8} ~onSpawn"
  - "beam{range=14.0,damage_multiplier=1.0} damage{} chain{count=3,range=8.0,damage_multiplier=0.55} ~onTimer:60"
  - "explode{radius=4.0,damage=18.0,particle=ENCHANT} ~onDeath"
  LootPool: basic_mob_drops

# Pattern: mark on hit + beam-detonate on timer (combo sequence)
# The blood shade marks the player on each melee hit. Every 4 seconds it fires
# a beam — the damage{} in that sequence detonates any pending mark for 2× bonus.
# Fighting it safely requires bursting it down before the timer fires.
blood_shade:
  MinecraftMob: zombie
  DisplayName: '&4Blood Shade'
  Health: 220
  Damage: 16
  Armor: 8
  Abilities:
  - "particles{type=CRIT,count=24,spread=0.5} ~onSpawn"
  - "mark{bonus=2.0,duration=200,consume=true} ~onHit"
  - "beam{range=10.0,damage_multiplier=1.3} damage{} ~onTimer:80"
  LootPool: basic_mob_drops

# Pattern: shield on hurt + ground slam on timer + launch on hit (boss design)
# The shield golem is a mini-boss that shields itself each time it takes damage,
# making burst windows crucial. Its ground slam hits nearby players every 6 seconds.
# Melee hits launch players into the air.
shield_golem:
  MinecraftMob: iron_golem
  DisplayName: '&f&lShield Golem'
  Health: 1200
  Damage: 28
  Armor: 45
  Stats:
    crit_chance: 10
    crit_damage: 50
  Abilities:
  - "sound{key=entity.iron_golem.attack,volume=1.2,pitch=0.6} particles{type=ENCHANT,count=40,spread=1.0} ~onSpawn"
  - "shield{amount=150,duration=120,target=caster} particles{type=ENCHANT,count=12} ~onHurt"
  - "aoe{radius=5.0,damage_multiplier=0.7,damage=10.0,particle=CLOUD} sound{key=entity.generic.explode,volume=0.8,pitch=1.4} ~onTimer:120"
  - "launch{force=1.2,horizontal=0.4,target=target} ~onHit"
  LootPools:
  - boss_drops
  - elite_bonus_drops

# Pattern: blink on timer + drain on hit + void zone on death
# The void phantom repositions every 4 seconds with a blink, drains life on hit,
# and leaves a lingering damage zone where it dies. Chasing it is risky.
void_phantom:
  MinecraftMob: phantom
  DisplayName: '&8Void Phantom'
  Health: 160
  Damage: 14
  Armor: 3
  Stats:
    speed: 20
    crit_chance: 12
    crit_damage: 50
  Abilities:
  - "particles{type=PORTAL,count=20,spread=0.6} ~onSpawn"
  - "blink{range=10.0,particles=true} ~onTimer:80"
  - "drain{amount=12.0,leech=0.8} ~onHit"
  - "zone{radius=5.0,duration=180,interval=20,damage=10.0,particle=PORTAL} ~onDeath"
  LootPool: basic_mob_drops
