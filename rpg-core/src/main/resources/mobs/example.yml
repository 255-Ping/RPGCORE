# Sample mobs shipped with rpg-core. Each top-level key is a mob ID.
# Spawn via: /rpg mob spawn <id> [count]
#
# Fields:
#   MinecraftMob — base EntityType (zombie, skeleton, blaze, ...)
#   DisplayName  — optional, shown above the mob
#   Health       — max HP (also sets MAX_HEALTH attribute)
#   Damage       — base melee damage
#   Armor        — armor value; mapped to the DEFENSE stat for our pipeline
#   Stats        — bonus stat map (additive on top of damage/armor)
#   Equipment    — list of "<SLOT> <itemId>" — HELMET / CHEST / LEGS /
#                  BOOTS / HAND / OFFHAND. itemId resolves via item registry
#                  first, falls back to a vanilla Material.
#   Abilities    — list of ability invocations + trigger suffix
#                  (~onTimer:N | ~onHit | ~onHurt | ~onSpawn | ~onDeath).
#                  No trigger = ~onSpawn.
#   LootTable    — inline drop table (optional):
#                    attribution: last-hit | top-damager | split-equal | weighted-by-damage
#                    roll-mode:   per-player | shared
#                    rolls:       list of { item, chance (%), min, max, magic-find-affected }
#                    guaranteed:  list of { item, min, max }
#                    currency-rolls: list of { chance (%), min, max } — deposited directly to
#                                    each eligible player's balance (requires rpg-economy)

testmob:
  MinecraftMob: zombie
  DisplayName: '&cTest Zombie'
  Health: 50
  Damage: 5
  Armor: 1
  Equipment:
  - HELMET leather_helmet
  - CHEST leather_chestplate
  - LEGS leather_leggings
  - BOOTS leather_boots
  - HAND stone_sword
  Abilities:
  - particles{type=flame,count=8} ~onSpawn
  - explode{radius=5,damage_multiplier=0.5,particle=flame} ~onTimer:100
  LootTable:
    attribution: last-hit
    roll-mode: per-player
    rolls:
    - { item: rotten_flesh, chance: 80.0, min: 1, max: 3 }
    # magic-find-affected drops — base rates chosen so the magic_find_crown (+100 MF) is obvious:
    #   red_gem:          35% base → 70% with crown
    #   crude_iron_ingot: 15% base → 30% with crown
    - { item: red_gem, chance: 35.0, min: 1, max: 1, magic-find-affected: true }
    - { item: crude_iron_ingot, chance: 15.0, min: 1, max: 2, magic-find-affected: true }
    guaranteed:
    - { item: bone, min: 1, max: 1 }
    # currency-rolls: deposited directly to the killer's balance — no item dropped.
    currency-rolls:
    - { chance: 100.0, min: 10, max: 25 }   # always drops 10–25 coins

mini_boss:
  MinecraftMob: zombified_piglin
  DisplayName: '&5Mini Boss'
  Health: 500
  Damage: 20
  Armor: 30
  Stats:
    crit_chance: 25
    crit_damage: 100
  Equipment:
  - HAND iron_sword
  Abilities:
  - sound{key=entity.wither.spawn,volume=1.0,pitch=0.5} ~onSpawn
  - particles{type=large_smoke,count=15} ~onHurt
  LootTable:
    attribution: top-damager
    roll-mode: per-player
    rolls:
    - { item: aspect_of_test, chance: 25.0, min: 1, max: 1, magic-find-affected: true }
    - { item: gold_ingot, chance: 60.0, min: 2, max: 5 }
    guaranteed:
    - { item: emerald, min: 1, max: 2 }
