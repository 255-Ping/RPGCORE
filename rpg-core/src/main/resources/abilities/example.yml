# Sample custom abilities. Each top-level key is an ability id usable in any
# item / mob Abilities list. Hard-floor Cooldown (ticks) cannot be overridden.
#
# Built-in effects:
#   damage{amount=, damage_multiplier=, type=physical/true}
#   heal{amount=, target=caster/target}
#   beam{range=, damage_multiplier=, particle=}        sets target + point; scales carried damage; NO direct hit
#                                                       follow with damage{} for a direct hit, explode{} for AoE
#   explode{radius=, damage=, damage_multiplier=, particle=}
#   particles{type=, count=, offset=}
#   sound{key=, volume=, pitch=}
#   delay{ticks=}
#   apply_status{id=, level=, duration=, target=caster/target}
#   mana_cost{amount=}                                 throws on insufficient
#   cooldown{ticks=, key=}
#
# Target selection (set ctx.target before downstream effects):
#   nearest_enemy{range=12.0}
#   farthest_enemy{range=12.0}
#   nearest_ally{range=12.0, priority=nearest|lowest_health|lowest_mana}
#   random_enemy{range=12.0}
#   self{}                                             target = caster
#   (allow_pvp=true on any enemy selector lets players target other players)
#
# Conditional gates (skip remaining chain if condition fails):
#   if_health_below{percent=50}
#   if_health_above{percent=50}
#   if_mana_below{percent=30}
#   if_mana_above{percent=70}
#   if_marked{}                                        ctx.target must have an active mark{}
#   if_target_has_status{id=poison}                    ctx.target must have status active
#   if_flag{name=X}                                    caster must have flag X set
#   if_not_flag{name=X}                                caster must NOT have flag X set
#   set_flag{name=X}                                   set flag X on caster (persists until death)
#   clear_flag{name=X}                                 clear flag X from caster

testability:
  AbilitySequence:
  - mana_cost{amount=20}
  - beam{range=8, damage_multiplier=1.5, particle=crit}
  - damage{damage_multiplier=1.0}
  - explode{radius=3, damage_multiplier=0.5, particle=explosion}
  - sound{key=entity.generic.explode, volume=1.0, pitch=1.2}
  Cooldown: 40

healing_pulse:
  AbilitySequence:
  - mana_cost{amount=30}
  - heal{amount=20, target=caster}
  - particles{type=heart, count=12, offset=0.4}
  - sound{key=entity.player.levelup, volume=0.5, pitch=1.5}
  Cooldown: 60

poison_dart:
  AbilitySequence:
  - mana_cost{amount=10}
  - beam{range=12, damage_multiplier=0.5, particle=witch}
  - apply_status{id=poison, level=1, duration=200, target=target}
  Cooldown: 20

# ── Target selection examples ─────────────────────────────────────────────────

# Drain the nearest enemy in range — good for mob timers.
# If no enemy is within 14 blocks the target remains null and drain{} no-ops.
mob_leech:
  Name: "&5Leech"
  Description:
    - "Siphon life from the nearest enemy."
  AbilitySequence:
  - nearest_enemy{range=14.0}
  - drain{amount=12, leech=0.8}
  - particles{type=soul_fire_flame, count=8, offset=0.5}
  Cooldown: 60

# Heal the most-wounded nearby ally.
triage_pulse:
  Name: "&aField Medic"
  Description:
    - "Heals the ally with the lowest HP."
  AbilitySequence:
  - mana_cost{amount=25}
  - nearest_ally{range=18.0, priority=lowest_health}
  - heal{amount=35, target=target}
  - particles{type=heart, count=10, offset=0.4}
  Cooldown: 80

# ── Conditional flow examples ─────────────────────────────────────────────────

# Execute strike: triple damage only when the target is below 30% HP.
execute_strike:
  Name: "&cExecute"
  Description:
    - "Triple damage against targets below 30% HP."
  AbilitySequence:
  - mana_cost{amount=30}
  - beam{range=10.0}
  - if_health_below{percent=30}
  - damage{damage_multiplier=3.0}
  - particles{type=crit, count=20, offset=0.3}
  Cooldown: 40

# Detonate a mark on the nearest enemy — only fires if target is marked.
mark_detonator:
  Name: "&dDetonation"
  Description:
    - "Detonates your mark on the nearest enemy."
  AbilitySequence:
  - mana_cost{amount=20}
  - nearest_enemy{range=12.0}
  - if_marked{}
  - damage{damage_multiplier=3.5}
  - explode{radius=3.5, damage_multiplier=0.5, particle=crit_magic}
  Cooldown: 20

# Boss phase-2 trigger: enrage once when HP drops below 25%.
# set_flag{} prevents re-entry on subsequent timer ticks.
# (Put this in a mob YAML as a ~onTimer ability line.)
boss_phase2_trigger:
  # Phase 2 enrage: at 25% HP, spawn two adds + shield.
  # set_flag{} ensures this fires exactly once per life.
  # (Attach to a mob under Abilities: as a ~onTimer:20 line.)
  AbilitySequence:
  - if_health_below{percent=25}
  - if_not_flag{name=enraged}
  - set_flag{name=enraged}
  - spawn_mob{id=golem_shard, count=2, radius=5.0}
  - shield{amount=200, duration=100, target=caster}
  - particles{type=soul_fire_flame, count=40, spread=1.0}
  - sound{key=entity.wither.spawn, volume=1.0, pitch=0.8}

# ── #42 spawn_mob{} showcase ────────────────────────────────────────────────

on_death_spawn:
  # On-death: the mob splits into two weaker shards.
  # Uses at=caster so shards appear at the original mob's position.
  AbilitySequence:
  - spawn_mob{id=shadow_shard, count=2, at=caster, radius=2.0}

summon_ally:
  # Player item: right-click to summon a temporary skeleton ally.
  # owned=true means it won't attack the caster and despawns on logout.
  AbilitySequence:
  - mana_cost{amount=50}
  - cooldown{ticks=400}
  - spawn_mob{id=summoned_skeleton, count=1, at=caster, radius=2.0, owned=true}
