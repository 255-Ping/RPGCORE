name: rpg-accessories
version: '${version}'
main: com.github._255_ping.rpg.accessories.RpgAccessoriesPlugin
api-version: '26.1.2'
load: POSTWORLD
authors: [Ping]
description: Accessory bag with separate inventory; ACCESSORY items aggregate into stats.
depend: [rpg-core]
commands:
  accessories:
    description: Open your accessory bag
    aliases: [bag]
    usage: /accessories
permissions:
  rpg.accessories.open:
    description: Open your accessory bag
    default: true
