name: rpg-accessories
version: '${version}'
main: com.github._255_ping.rpg.accessories.RpgAccessoriesPlugin
api-version: '26.1.2'
load: POSTWORLD
authors: [Ping]
description: Accessory bag with separate inventory; ACCESSORY items aggregate into stats.
depend: [rpg-core]
commands:
  accessories:
    description: Open your accessory bag (or upgrade it)
    aliases: [bag]
    usage: /accessories [upgrade|reload]
permissions:
  rpg.accessories.open:
    description: Open your accessory bag
    default: true
  rpg.accessories.upgrade:
    description: Upgrade your accessory bag tier
    default: true
  rpg.accessories.admin.reload:
    description: Reload rpg-accessories config
    default: op
