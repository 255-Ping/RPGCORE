# rpg-accessories — accessory bag.

bag:
  title: "&5&lAccessory Bag"

# Ordered tier list. tier 1 is the starting size for new players.
# rows is 1..6; cost is in primary currency; the player upgrades from tier N to N+1
# by paying the cost listed on tier N+1.
tiers:
  - { tier: 1, rows: 1, cost: 0 }
  - { tier: 2, rows: 2, cost: 1000 }
  - { tier: 3, rows: 3, cost: 5000 }
  - { tier: 4, rows: 4, cost: 25000 }
  - { tier: 5, rows: 5, cost: 100000 }
  - { tier: 6, rows: 6, cost: 500000 }
