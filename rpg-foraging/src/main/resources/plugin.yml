name: rpg-foraging
version: '${version}'
main: com.github._255_ping.rpg.foraging.RpgForagingPlugin
api-version: '26.1.2'
load: POSTWORLD
authors: [Ping]
description: Foraging skill — XP from breaking log blocks.
depend: [rpg-core]
commands:
  foraging:
    description: Foraging admin commands
    usage: /foraging reload
permissions:
  rpg.foraging.admin.reload:
    description: Reload rpg-foraging config
    default: op
