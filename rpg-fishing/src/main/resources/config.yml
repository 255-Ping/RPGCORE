# ${pluginName} v${version}
# Fishing skill — custom catch tables, XP, and stat integration.
#
# Stats wired by this plugin:
#   FISHING_WISDOM  — multiplies XP per catch:   XP = xp-per-catch * (1 + wisdom / 100)
#   FISHING_FORTUNE — boosts fortune-affected entries in the catch table (see fishing-fortune below)
#   FISHING_SPEED   — shortens bobber wait time on cast (see fishing-speed below)
#
# Reload with: /fishing reload

# ── Base XP ──────────────────────────────────────────────────────────────────
# XP awarded to the fishing skill on every successful catch (before FISHING_WISDOM scaling).
xp-per-catch: 10

# ── Catch table ───────────────────────────────────────────────────────────────
# Name of the catch table to use. Must match a filename in plugins/rpg-fishing/catch-tables/
# (without the .yml extension). Create additional tables for biome-specific fishing, events, etc.
active-table: default

# ── FISHING_SPEED ─────────────────────────────────────────────────────────────
# Reduces how long the player waits for a bite.
# Formula: multiplier = max(0.1, 1 - FISHING_SPEED / scale)
#          new_min = max(floor-min-ticks, base-min-ticks × multiplier)
#          new_max = max(floor-max-ticks, base-max-ticks × multiplier)
# Example (scale=300): FISHING_SPEED=150 → ×0.5 → 50 min / 300 max ticks
fishing-speed:
  base-min-ticks: 100    # Vanilla lower bound (ticks before earliest bite)
  base-max-ticks: 600    # Vanilla upper bound (ticks before latest bite)
  floor-min-ticks: 20    # Hard minimum min-wait regardless of FISHING_SPEED
  floor-max-ticks: 40    # Hard minimum max-wait
  scale: 300.0           # FISHING_SPEED value that halves the wait (1 − speed/scale = 0.5)

# ── FISHING_FORTUNE ───────────────────────────────────────────────────────────
# Boosts the chance of entries marked fortune-affected: true in the catch table.
# Formula: effective_chance = base_chance × min(max-multiplier, 1 + FISHING_FORTUNE / scale)
# Example (scale=100): FISHING_FORTUNE=100 → 2× chance; FISHING_FORTUNE=200 → 3× (if max is 5)
fishing-fortune:
  scale: 100.0          # Divisor for the fortune bonus (lower = more powerful per point)
  max-multiplier: 5.0   # Cap on the fortune multiplier (prevents absurdly high chances)
