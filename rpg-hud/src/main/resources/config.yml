# rpg-hud — Scoreboard / tablist / action bar templates.
#
# Placeholders (resolved at render time):
#   {name}, {prefix}, {suffix}        — player display + LuckPerms prefix/suffix
#   {health}, {max_health}            — RPG HP
#   {mana}, {max_mana}                — mana
#   {coins}                           — primary-currency balance (if rpg-economy is loaded)
#   {online}, {world}                 — server / world info
#   {<stat-id>}                       — any stat by id (e.g., {defense}, {strength})
#   {skill:<id>:level}                — skill level (e.g., {skill:combat:level})
#   {skill:<id>:total_xp}             — total skill XP
#   {skill:<id>:to_next}              — XP needed to reach next level

scoreboard:
  enabled: true
  title: "&6&lRPG"
  update-ticks: 10
  lines:
  - "&7&m                  "
  - "&7Health: &c{health}&7/&c{max_health}"
  - "&7Mana: &b{mana}&7/&b{max_mana}"
  - "&7Defense: &a{defense}"
  - "&7&m                  "
  - "&7Combat: &c{skill:combat:level}"
  - "&7Mining: &6{skill:mining:level}"
  - "&7&m                  "
  - "&e{coins} coins"

tablist:
  enabled: true
  update-ticks: 40
  header:
  - "&6&lRPG SERVER"
  - "&7Players online: &f{online}"
  footer:
  - "&7Combat: &c{skill:combat:level} &8| &7Mining: &6{skill:mining:level}"

action-bar:
  enabled: true
  update-ticks: 5
  idle-format: "&c❤ {health}/{max_health}  &b✦ {mana}/{max_mana}  &a✤ {defense}"
