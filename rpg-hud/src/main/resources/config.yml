# Generated by: ${pluginName} v${version}
# rpg-hud — Scoreboard / tablist / action bar templates.
#
# Placeholders (resolved at render time):
#   {name}, {prefix}, {suffix}        — player display + LuckPerms prefix/suffix
#   {health}, {max_health}            — RPG HP
#   {mana}, {max_mana}                — mana
#   {coins}                           — primary-currency balance (if rpg-economy is loaded)
#   {online}, {world}                 — server / world info
#   {<stat-id>}                       — any stat by id (e.g., {defense}, {strength})
#   {skill:<id>:level}                — skill level (e.g., {skill:combat:level})
#   {skill:<id>:total_xp}             — total skill XP
#   {skill:<id>:to_next}              — XP needed to reach next level
#   {tps}                             — server TPS (1-min average, color-coded green/yellow/red)
#   {ram_used}, {ram_max}             — JVM heap usage in MB
#   {ping}                            — player's current ping in ms
#   {party_members}                   — newline-joined list of party members with HP; empty when solo
#   {cooldowns}                       — compact list of active ability cooldowns (e.g. "Ability (10s)")
#   {recent_xp}                       — last skill XP gain, fades after recent-xp.fade-ms milliseconds
#   {effects}                         — active status effects with duration
# Color codes: & followed by 0-9 or a-f for color, l/o/n/m/k/r for formatting.

scoreboard:
  enabled: true
  title: "&6&lRPG"         # scoreboard title; shown at the top of the sidebar
  update-ticks: 10         # how often the scoreboard refreshes (10 = twice per second)
  lines:
  - "&7&m                  "
  - "&7Health: &c{health}&7/&c{max_health}"
  - "&7Mana: &b{mana}&7/&b{max_mana}"
  - "&7Defense: &a{defense}"
  - "&7&m                  "
  - "&7Combat: &c{skill:combat:level}"
  - "&7Mining: &6{skill:mining:level}"
  - "&7&m                  "
  - "{recent_xp}"
  - "{party_members}"
  - "{cooldowns}"
  - "&e{coins}"

tablist:
  enabled: true
  update-ticks: 40         # tab list refreshes less often to save CPU (40 = every 2 seconds)
  # Format for each player's name entry in the tab list. LuckPerms prefixes typically
  # include surrounding spaces already (e.g. "[Admin] "), so no space between tokens by default.
  player-name-format: "{prefix}{name}{suffix}"
  header:
  - "&6&lRPG SERVER"
  - "&7Players online: &f{online}  &7TPS: {tps}  &7RAM: &f{ram_used}&7/{ram_max}"
  - "&7Ping: &f{ping}"
  footer:
  - "&7Combat: &c{skill:combat:level} &8| &7Mining: &6{skill:mining:level}"
  - "{effects}"

action-bar:
  enabled: true
  update-ticks: 5          # action bar refreshes frequently for smooth stat display (5 = 4/sec)
  idle-format: "&c❤ {health}/{max_health}  &b✦ {mana}/{max_mana}  &a✤ {defense}  {cooldowns}"
  # idle-format shows when no other system is pushing a higher-priority action bar message.
  # Other systems (combat, skills) override this with their own messages temporarily.

# Nametag above the player's head. Uses a TextDisplay entity riding the player; supports the
# same placeholders as the rest of the HUD. Hides when sneaking by default.
nametag:
  enabled: true
  format: "{prefix} {name} {suffix}"   # supports & color codes and all HUD placeholders
  hide-when-sneaking: true              # true = nametag disappears while player is sneaking
  y-offset: 0.5                         # blocks above the player's head (applied as Display translation)
  update-ticks: 10                      # how often the nametag re-renders (10 = twice per second)

# How long the {recent_xp} placeholder stays visible after a skill XP gain.
# Gains for the same skill within this window are accumulated. Requires restart to change.
recent-xp:
  fade-ms: 5000
